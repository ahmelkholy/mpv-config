# Update yt-dlp in the background after this many days.
auto_update=yes
update_interval_days=7

# Highest normal YouTube quality to request; fallback is used once after failure.
max_height=480
fallback_height=360

# Adaptive resource budgets. Video mode stays lean by default; audio-only mode
# asks yt-dlp for audio only and keeps a much smaller network buffer.
audio_only_format=ba/bestaudio/best
normal_readahead_secs=8
normal_max_bytes=128MiB
normal_max_back_bytes=32MiB
audio_readahead_secs=3
audio_max_bytes=32MiB
audio_max_back_bytes=4MiB

# Optional fixes for 429, login-only, or age-restricted videos.
# Examples: edge, chrome, firefox
cookies_from_browser=

# Advanced yt-dlp extractor args, left empty by default.
# Example: youtube:player_client=default
extractor_args=
