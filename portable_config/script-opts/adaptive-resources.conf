# Automatically switch to audio-only mode when the window is minimized.
auto_minimize=yes
restore_on_unminimize=yes
minimize_delay=1.5

# Reload network videos when switching modes so YouTube can stop fetching video.
reload_network=yes
audio_only_format=ba/bestaudio/best
start_audio_only=no

# Buffer budgets used by the adaptive script.
video_readahead_secs=8
video_max_bytes=128MiB
video_max_back_bytes=32MiB
audio_readahead_secs=3
audio_max_bytes=32MiB
audio_max_back_bytes=4MiB

show_osd=yes
