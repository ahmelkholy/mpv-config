# Persist and restore remaining YouTube queue items between mpv sessions.
restore_on_start=yes
save_all_urls=no

# Expand YouTube playlist/radio links into individual videos before queuing.
expand_playlists=yes

# Maximum playlist/radio items to add. 0 means all items yt-dlp returns.
playlist_limit=0

# Optional explicit yt-dlp path. Leave empty to use portable_config/yt-dlp.exe or PATH.
ytdlp_path=
