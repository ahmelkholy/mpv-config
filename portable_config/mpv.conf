### Profile ###

include="~~/profiles.conf"

### Video ###

vo=gpu-next
gpu-api=d3d11
vd-lavc-dr=yes
gpu-context=auto
hwdec-codecs=all
hwdec=d3d11va-copy
d3d11va-zero-copy=yes
d3d11-exclusive-fs=no
d3d11-adapter=

deband=no
deband-iterations=1
deband-threshold=48
deband-range=16
deband-grain=32

temporal-dither

### Audio and Subtitles ###

slang=ar,ara,Arabic,en,eng,English
alang=ja,jp,jpn,jap,Japanese,en,eng,English

sub-blur=0.5
sub-gauss=1.5
sub-scale=0.7
sub-margin-y=60
sub-color='#eceff4'
sub-shadow-offset=0
sub-outline-size=1.15
sub-font=Clear Sans Bold
sub-back-color='#2e3440'
sub-border-color='#2e3440'
sub-shadow-color='#2e3440'
sub-outline-color='#2e3440'

# Secondary Subtitles (for dual subs)
secondary-sub-ass-override=yes
secondary-sub-delay=0
secondary-sub-pos=100

sub-auto=all
sub-use-margins=yes
sub-ass-force-margins=yes
sub-pos=92
volume-max=200
sub-fix-timing=yes
blend-subtitles=yes
sub-ass-override=yes
audio-file-auto=fuzzy
audio-pitch-correction=yes
audio-normalize-downmix=yes
audio-channels=7.1,5.1,stereo
sub-file-paths-append=subtitles
demuxer-mkv-subtitle-preroll=yes
sub-file-paths=sub;subs;subtitles

