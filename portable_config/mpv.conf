### Functions ###

osc=no
fs=yes
snap-window
keep-open=yes
save-position-on-quit=yes
watch-later-dir="~~/cache/watch_later"
gpu-shader-cache-dir="~~/cache/shaders_cache"
input-ipc-server=\\.\pipe\mpv-youtube-queue

### YouTube / network playback ###

ytdl=yes
script-opts-append=ytdl_hook-ytdl_path=C:/Users/ahm_e/mpv/portable_config/yt-dlp.exe
script-opts-append=ytdl_hook-try_ytdl_first=yes
ytdl-format=bv*[height<=2160]+ba/b[height<=2160]/bv*+ba/b
hls-bitrate=max
cache=yes
cache-on-disk=no
demuxer-seekable-cache=yes
demuxer-readahead-secs=20
demuxer-max-bytes=512MiB
demuxer-max-back-bytes=128MiB
network-timeout=30
stream-buffer-size=4MiB

### OSD ###

no-border
osd-bar=no
osd-bold=yes
osd-font-size=37
osd-font='JetBrains Mono'
